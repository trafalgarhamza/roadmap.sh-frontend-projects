<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact page for portfolio inquiries, freelance work, and collaboration.">
  <meta name="keywords" content="contact, portfolio, freelance, work with me, collaboration">
  <meta name="author" content="Your Name">
  <title>Portfolio - Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
  <div class="container py-5">
    <header class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-4 mb-5">
      <div>
        <h1 class="display-6 fw-bold">Contact</h1>
        <p class="text-muted mb-0">Send a message to discuss a project or collaboration.</p>
      </div>
      <nav>
        <ul class="nav justify-content-md-end">
          <li class="nav-item"><a class="nav-link text-light" href="homepage.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link text-light" href="articles.html">Articles</a></li>
          <li class="nav-item"><a class="nav-link active text-white" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="p-4 rounded-4 bg-secondary bg-opacity-25 border border-secondary">
        <h2 class="h5 mb-4">Let’s build something together</h2>
        <form action="#" method="post" class="row g-3">
          <div class="col-12 col-md-6">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          <div class="col-12 col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="col-12">
            <label for="subject" class="form-label">Project or inquiry</label>
            <input type="text" class="form-control" id="subject" name="subject">
          </div>
          <div class="col-12">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" name="message" rows="6" required></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Send Message</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="mt-5 text-center text-muted">
      <p class="mb-0">© 2026 Portfolio</p>
    </footer>
  </div>
</body>
</html>
